repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        pass_filenames: false
        additional_dependencies:
          - types-pywin32
          - PySide6>=6.5
          - pypdf>=4.0
          - Pillow>=10.0
          - PyMuPDF>=1.23
          - chardet>=5.0
          - typer>=0.9
