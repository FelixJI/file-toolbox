[project]
name = "file-toolbox"
version = "0.1.6"
description = "批量文件工具箱:重命名、建文件夹、生成 PDF、内容替换"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.9",
    "pypdf>=4.0",
    "Pillow>=10.0",
    "PyMuPDF>=1.23",
    "chardet>=5.0",
    'pywin32>=306; platform_system == "Windows"',
]

[project.optional-dependencies]
gui = ["PySide6>=6.5"]
invoice = ["pdfplumber>=0.11", "openpyxl>=3.1"]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.5", "mypy>=1.10", "reportlab>=4.0", "packaging>=24.0", "pyinstaller>=6.0"]

[project.scripts]
file-toolbox = "file_toolbox.cli.main:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["file_toolbox*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
